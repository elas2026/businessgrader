// ── Scoring engine ─────────────────────────────────────────────
function generateScores(url) {
  const seed = url.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const r = (min, max, offset = 0) => {
    const v = ((seed * 9301 + 49297 + offset * 7919) % 233280) / 233280;
    return Math.round(min + v * (max - min));
  };

  // AI readiness is typically LOW for professional services — that's the point
  return {
    digital: {
      score: r(30, 88, 1),
      label: "Digital Foundation",
      icon: "🌐",
      description: "Your website's technical readiness to support AI integration",
      insight: null,
      items: [
        { name: "Website Performance", value: r(20, 90, 10), detail: r(1, 6, 11) + "." + r(1, 9, 12) + "s load time", tip: "AI agents need fast APIs — slow sites mean slow agents" },
        { name: "Mobile Experience", value: r(25, 95, 20), detail: r(25, 95, 20) > 70 ? "Responsive design" : "Not mobile-optimised", tip: "70% of clients find you on mobile first" },
        { name: "Structured Data / Schema", value: r(5, 60, 30), detail: r(0, 4, 31) + " schema types found", tip: "AI agents rely on structured data to understand your services" },
        { name: "API / Integration Readiness", value: r(5, 50, 40), detail: r(5, 50, 40) > 30 ? "Some APIs detected" : "No public APIs found", tip: "AI agents need APIs to interact with your systems" },
        { name: "Security & SSL", value: r(50, 100, 50), detail: r(50, 100, 50) > 75 ? "SSL active" : "Security concerns", tip: "Essential for safe AI agent data handling" },
      ],
    },
    automation: {

function getGrade(score) {
  if (score >= 90) return { letter: "A+", color: BRAND.success, label: "AI-Ready Leader" };
  if (score >= 80) return { letter: "A", color: BRAND.success, label: "Well Prepared" };
  if (score >= 70) return { letter: "B", color: "#22C55E", label: "Good Foundation" };
  if (score >= 60) return { letter: "C+", color: BRAND.warning, label: "Getting There" };
  if (score >= 50) return { letter: "C", color: BRAND.warning, label: "Falling Behind" };
  if (score >= 40) return { letter: "D", color: BRAND.danger, label: "At Risk" };
  if (score >= 25) return { letter: "D-", color: BRAND.danger, label: "Significant Gaps" };
  return { letter: "F", color: BRAND.danger, label: "Not AI-Ready" };
}

function getScoreColor(s) {
  if (s >= 75) return BRAND.success;
  if (s >= 50) return BRAND.warning;
  return BRAND.danger;
}

function getReadinessLevel(score) {
  if (score >= 70) return { level: "High", color: BRAND.success, message: "Your practice is well-positioned for AI agent deployment. You could see ROI within weeks." };
  if (score >= 50) return { level: "Moderate", color: BRAND.warning, message: "Your practice has a foundation but needs key upgrades before AI agents can deliver full value." };
  if (score >= 30) return { level: "Low", color: BRAND.orange, message: "Your practice is behind the curve. Competitors adopting AI agents now will pull ahead fast." };
  return { level: "Critical", color: BRAND.danger, message: "Your practice is at serious risk of disruption. Immediate action needed to stay competitive." };
}

// Revenue opportunity estimator based on practice type
function estimateOpportunity(scores) {
  const avgScore = Math.round((scores.digital.score + scores.automation.score + scores.cx.score + scores.visibility.score) / 4);
  const gap = 100 - avgScore;
  const hoursPerWeek = Math.round(gap * 0.4);
  const revenueAtRisk = Math.round(gap * 1200);
  const missedLeads = Math.round(gap * 0.8);
  return { hoursPerWeek, revenueAtRisk, missedLeads, gap };
}

function AnimatedNumber({ target, duration = 1500, delay = 0, prefix = "", suffix = "" }) {
  const [current, setCurrent] = useState(0);
  const [started, setStarted] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setStarted(true), delay);
    return () => clearTimeout(t);
  }, [delay]);
  useEffect(() => {
    if (!started) return;
    let start = null;
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setCurrent(Math.round(eased * target));
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target, duration, started]);
  return <span>{prefix}{current.toLocaleString()}{suffix}</span>;
}

function ScoreRing({ score, size = 160, strokeWidth = 10, delay = 0, showGrade = true }) {
  const [progress, setProgress] = useState(0);
  const radius = (size - strokeWidth) / 2;
  const circ = 2 * Math.PI * radius;
  const grade = getGrade(score);
  useEffect(() => {
    const t = setTimeout(() => setProgress(score), delay + 100);
    return () => clearTimeout(t);
  }, [score, delay]);

  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size / 2} cy={size / 2} r={radius} fill="none" stroke={`${BRAND.midGray}`} strokeWidth={strokeWidth} />
        <circle cx={size / 2} cy={size / 2} r={radius} fill="none"
          stroke={grade.color} strokeWidth={strokeWidth}
          strokeDasharray={circ} strokeDashoffset={circ - (progress / 100) * circ}
          strokeLinecap="round"
          style={{ transition: "stroke-dashoffset 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)" }}
        />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <div style={{ fontSize: size * 0.28, fontWeight: 800, color: BRAND.navy, fontFamily: "'Space Grotesk', sans-serif", lineHeight: 1 }}>
          <AnimatedNumber target={score} delay={delay + 100} />
        </div>
        {showGrade && (
          <div style={{ fontSize: size * 0.1, fontWeight: 700, color: grade.color, marginTop: 2, letterSpacing: 0.5 }}>
            {grade.letter}
          </div>
        )}
      </div>
    </div>
  );
}

function ScoreBar({ value, delay = 0 }) {
  const [width, setWidth] = useState(0);
  useEffect(() => {
    const t = setTimeout(() => setWidth(value), delay);
    return () => clearTimeout(t);
  }, [value, delay]);
  return (
    <div style={{ width: "100%", height: 6, background: BRAND.midGray, borderRadius: 3, overflow: "hidden" }}>
      <div style={{
        height: "100%", borderRadius: 3, background: getScoreColor(value),
        width: `${width}%`, transition: "width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94)",
      }} />
    </div>
  );
}

            color: `${BRAND.white}50`, fontSize: 13, textAlign: "center",
            maxWidth: 460, lineHeight: 1.5, margin: "0 0 36px 0",
            opacity: 0, animation: "fadeDown 0.6s ease 0.35s forwards",
          }}>
            The same assessment consultants charge $3,000+ for — powered by our Clawbot AI agent team.
          </p>

          {/* Industry selector */}
          <div style={{
            display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap", justifyContent: "center",
            opacity: 0, animation: "fadeDown 0.6s ease 0.4s forwards",
          }}>
            {[
              { val: "legal", label: "⚖️ Law Firm" },
              { val: "accounting", label: "📊 Accounting" },
              { val: "medical", label: "🏥 Medical / Clinic" },
              { val: "dental", label: "🦷 Dental" },
              { val: "financial", label: "💰 Financial Services" },
              { val: "other", label: "🏢 Other" },
            ].map((opt) => (
              <button key={opt.val} onClick={() => setIndustry(opt.val)}
                style={{
                  padding: "8px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600,
                  border: `1px solid ${industry === opt.val ? BRAND.orange : BRAND.white + "20"}`,
                  background: industry === opt.val ? `${BRAND.orange}20` : `${BRAND.white}08`,
                  color: industry === opt.val ? BRAND.orange : `${BRAND.white}80`,
                  cursor: "pointer", fontFamily: "inherit", transition: "all 0.2s",
                }}>
                {opt.label}
              </button>
            ))}
          </div>

          {/* URL Input */}
          <div style={{
            display: "flex", gap: 0, maxWidth: 520, width: "100%",
            borderRadius: 14, overflow: "hidden",
            boxShadow: `0 24px 64px ${BRAND.orange}20, 0 0 0 1px ${BRAND.white}10`,
            opacity: 0, animation: "fadeDown 0.6s ease 0.5s forwards",
          }}>
            <input type="text" value={url}
              onChange={(e) => setUrl(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && handleScan()}
              placeholder="Enter your website URL..."
              style={{
                flex: 1, padding: "17px 22px", fontSize: 15, border: "none", outline: "none",
                background: BRAND.white, color: BRAND.navy, fontFamily: "inherit",
              }}
            />
            <button onClick={handleScan}
              style={{
                padding: "17px 28px", background: BRAND.orange, color: BRAND.white,
                border: "none", fontSize: 15, fontWeight: 700, cursor: "pointer",
                whiteSpace: "nowrap", fontFamily: "inherit", transition: "background 0.2s",
              }}
              onMouseOver={(e) => (e.target.style.background = "#E65000")}
              onMouseOut={(e) => (e.target.style.background = BRAND.orange)}
            >
              Check My AI Readiness →
            </button>
          </div>

          {/* Stats bar */}
          <div style={{
            display: "flex", gap: 40, marginTop: 56,
            opacity: 0, animation: "fadeDown 0.6s ease 0.65s forwards",
          }}>
            {[
              { num: "2,400+", label: "Practices scored" },
              { num: "73%", label: "Score below 50" },
              { num: "42hrs", label: "Avg. weekly savings" },
            ].map((s, i) => (
              <div key={i} style={{ textAlign: "center" }}>
                <div style={{ fontSize: 20, fontWeight: 800, color: BRAND.orange }}>{s.num}</div>
                <div style={{ fontSize: 11, color: `${BRAND.white}50`, marginTop: 2 }}>{s.label}</div>
              </div>
            ))}
          </div>

          <p style={{
            color: `${BRAND.white}30`, fontSize: 11, marginTop: 56,
            opacity: 0, animation: "fadeDown 0.6s ease 0.8s forwards",
          }}>
            No login • No credit card • Results in 60 seconds • Powered by Clawbot AI
          </p>
        </div>
      )}

      {/* ═══ SCANNING ═══ */}
      {phase === "scanning" && (
        <div style={{
          minHeight: "100vh", display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center", padding: 40,
          background: `radial-gradient(ellipse at 50% 50%, #0A1B5E 0%, ${BRAND.navy} 100%)`,
        }}>
          <div style={{
            width: 88, height: 88, borderRadius: 22,
            background: `${BRAND.orange}15`, border: `2px solid ${BRAND.orange}30`,
            display: "flex", alignItems: "center", justifyContent: "center",
            marginBottom: 28, animation: "pulse 1.5s ease infinite",
          }}>
            <div style={{ fontSize: 40 }}>
              {scanSteps[Math.min(scanStep, scanSteps.length - 1)]?.icon || "✨"}
            </div>
          </div>

          <h2 style={{ color: BRAND.white, fontSize: 22, fontWeight: 700, marginBottom: 6 }}>
            Assessing AI Readiness
          </h2>
          <p style={{ color: `${BRAND.white}60`, fontSize: 14, marginBottom: 32, fontFamily: "'JetBrains Mono', monospace" }}>
            {url}
          </p>

          <div style={{ display: "flex", flexDirection: "column", gap: 14, maxWidth: 380, width: "100%" }}>
            {scanSteps.map((step, i) => (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 14,
                opacity: scanStep > i ? 1 : scanStep === i ? 0.6 : 0.2,
                transition: "opacity 0.5s ease",
              }}>
                <div style={{
                  width: 28, height: 28, borderRadius: 8,
                  background: scanStep > i ? `${BRAND.success}25` : `${BRAND.white}10`,
                  border: `1px solid ${scanStep > i ? BRAND.success + "50" : BRAND.white + "15"}`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 12, fontWeight: 700,
                  color: scanStep > i ? BRAND.success : `${BRAND.white}40`,
                  transition: "all 0.4s",
                }}>
                  {scanStep > i ? "✓" : step.icon}
                </div>
                <span style={{ color: BRAND.white, fontSize: 14, fontWeight: 500 }}>{step.label}</span>
              </div>
            ))}
          </div>

          <div style={{
            width: "100%", maxWidth: 380, height: 4,
            background: `${BRAND.white}10`, borderRadius: 2, marginTop: 36, overflow: "hidden",
          }}>
            <div style={{
              height: "100%", background: `linear-gradient(90deg, ${BRAND.orange}, #FF8C42)`,
              borderRadius: 2, width: `${(scanStep / scanSteps.length) * 100}%`,
              transition: "width 0.7s ease",
            }} />
          </div>
        </div>
      )}

      {/* ═══ RESULTS ═══ */}
      {(phase === "results" || phase === "email_done") && scores && (
        <div style={{ padding: "0 20px 60px" }}>
          {/* Top nav */}
          <div style={{
            display: "flex", alignItems: "center", justifyContent: "space-between",
            padding: "14px 24px", background: BRAND.navy, borderRadius: "0 0 16px 16px",
            maxWidth: 920, margin: "0 auto 28px",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{
                width: 28, height: 28, borderRadius: 7, background: BRAND.orange,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 14, fontWeight: 900, color: BRAND.white,
              }}>B</div>
              <span style={{ color: BRAND.white, fontSize: 14, fontWeight: 700 }}>BusinessGrader</span>
              <span style={{ color: `${BRAND.white}40`, fontSize: 11 }}>AI Readiness Report</span>
            </div>
            <button onClick={() => { setPhase("landing"); setUrl(""); setScores(null); setEmail(""); }}
              style={{
                padding: "7px 18px", background: `${BRAND.white}12`, color: BRAND.white,
                border: "none", borderRadius: 8, fontSize: 12, fontWeight: 600,
                cursor: "pointer", fontFamily: "inherit",
              }}>
              ← Score Another Practice
            </button>
          </div>

          <div style={{ maxWidth: 920, margin: "0 auto" }}>
            {/* ── Hero Score Card ── */}
            <div style={{
              background: BRAND.white, borderRadius: 24, padding: "40px 44px",
              textAlign: "center", marginBottom: 20,
              boxShadow: "0 4px 24px rgba(0,0,0,0.06)", border: `1px solid ${BRAND.midGray}`,
              opacity: 0, animation: "slideUp 0.5s ease 100ms forwards",
            }}>
              <div style={{
                display: "inline-flex", alignItems: "center", gap: 6,
                padding: "5px 14px", borderRadius: 20,
                background: `${readiness.color}12`, border: `1px solid ${readiness.color}30`,
                fontSize: 12, fontWeight: 700, color: readiness.color, marginBottom: 16,
              }}>
                🧠 AI READINESS: {readiness.level.toUpperCase()}
              </div>

              <div style={{
                fontSize: 13, color: BRAND.darkGray, fontWeight: 500, marginBottom: 4,
                letterSpacing: 0.5, textTransform: "uppercase",
              }}>
                AI Readiness Score for
              </div>
              <div style={{
                fontSize: 18, fontWeight: 700, color: BRAND.navy, marginBottom: 32,
                fontFamily: "'JetBrains Mono', monospace",
              }}>
                {url}
              </div>

              <div style={{ display: "flex", justifyContent: "center", marginBottom: 20 }}>
                <ScoreRing score={overallScore} size={190} strokeWidth={12} delay={0} />
              </div>

              <div style={{
                fontSize: 18, fontWeight: 800, color: BRAND.navy, marginBottom: 4,
                fontFamily: "'Space Grotesk', sans-serif",
              }}>
                {grade.label}
              </div>
              <div style={{ fontSize: 14, color: BRAND.darkGray, maxWidth: 500, margin: "0 auto", lineHeight: 1.5 }}>
                {readiness.message}
              </div>

              {/* Mini dimension summary */}
              <div style={{
                display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12,
                marginTop: 28, padding: "20px 16px", background: BRAND.lightGray, borderRadius: 14,
              }}>
                {[scores.digital, scores.automation, scores.cx, scores.visibility].map((d, i) => {
                  const g = getGrade(d.score);
                  return (
                    <div key={i} style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 18 }}>{d.icon}</div>
                      <div style={{ fontSize: 24, fontWeight: 800, color: BRAND.navy, fontFamily: "'Space Grotesk', sans-serif" }}>
                        <AnimatedNumber target={d.score} delay={200 + i * 150} />
                      </div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: g.color }}>{g.letter}</div>
                      <div style={{ fontSize: 10, color: BRAND.darkGray, marginTop: 2 }}>{d.label}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* ── AI Opportunity Card ── */}
            <div style={{ marginBottom: 20 }}>
              <OpportunityCard opportunity={opportunity} overallScore={overallScore} />
            </div>

            {/* ── Dimension Detail Cards ── */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
              {[scores.digital, scores.automation, scores.cx, scores.visibility].map((dim, i) => (
                <DimensionCard key={i} dimension={dim} index={i} />
              ))}
            </div>

            {/* ── Email CTA ── */}
            {phase === "results" && (
              <div style={{
                background: `linear-gradient(135deg, ${BRAND.navy} 0%, #0A1B5E 100%)`,
                borderRadius: 20, padding: "40px 44px", textAlign: "center",
                position: "relative", overflow: "hidden",
                opacity: 0, animation: "slideUp 0.5s ease 800ms forwards",
              }}>
                <div style={{
                  position: "absolute", bottom: -60, left: -60, width: 250, height: 250,
                  borderRadius: "50%", background: `${BRAND.orange}10`, filter: "blur(80px)",
                }} />
                <div style={{ position: "relative", zIndex: 1 }}>
                  <div style={{ fontSize: 32, marginBottom: 12 }}>📋</div>
                  <h3 style={{ color: BRAND.white, fontSize: 24, fontWeight: 800, marginBottom: 8, fontFamily: "'Space Grotesk', sans-serif" }}>
                    Get Your Full AI Transformation Roadmap
                  </h3>
                  <p style={{ color: `${BRAND.white}75`, fontSize: 14, maxWidth: 480, margin: "0 auto 8px", lineHeight: 1.6 }}>
                    Receive a detailed 20-page report with your personalised AI agent implementation plan, ROI projections, and step-by-step roadmap — the same analysis we deliver in our $5,000 discovery engagements.
                  </p>
                  <p style={{ color: BRAND.orange, fontSize: 13, fontWeight: 700, marginBottom: 24 }}>
                    Free for a limited time.
                  </p>
                  <div style={{ display: "flex", gap: 0, maxWidth: 460, margin: "0 auto", borderRadius: 12, overflow: "hidden" }}>
                    <input type="email" value={email}
                      onChange={(e) => setEmail(e.target.value)}
                      onKeyDown={(e) => e.key === "Enter" && handleEmailSubmit()}
                      placeholder="Enter your work email"
                      style={{
                        flex: 1, padding: "15px 20px", fontSize: 15,
                        border: "none", outline: "none", fontFamily: "inherit",
                      }}
                    />
                    <button onClick={handleEmailSubmit}
                      style={{
                        padding: "15px 28px", background: BRAND.orange, color: BRAND.white,
                        border: "none", fontSize: 15, fontWeight: 700, cursor: "pointer",
                        fontFamily: "inherit", whiteSpace: "nowrap",
                      }}>
                      Send My Roadmap →
                    </button>
                  </div>
                  <p style={{ color: `${BRAND.white}35`, fontSize: 11, marginTop: 14 }}>
                    No spam • Instant delivery • Includes AI agent ROI calculator
                  </p>
                </div>
              </div>
            )}

            {phase === "email_done" && (
              <div style={{
                background: BRAND.white, border: `2px solid ${BRAND.success}30`,
                borderRadius: 20, padding: "40px 44px", textAlign: "center",
                opacity: 0, animation: "slideUp 0.3s ease forwards",
              }}>
                <div style={{ fontSize: 44, marginBottom: 12 }}>🚀</div>
                <h3 style={{ color: BRAND.navy, fontSize: 24, fontWeight: 800, marginBottom: 8, fontFamily: "'Space Grotesk', sans-serif" }}>
                  Your AI Transformation Roadmap is on its way!
                </h3>
                <p style={{ color: BRAND.darkGray, fontSize: 14, marginBottom: 28, lineHeight: 1.5 }}>
                  Check <strong>{email}</strong> for your personalised report. Want to see how fast we can deploy AI agents for your practice?
                </p>
                <div style={{ display: "flex", justifyContent: "center", gap: 12, flexWrap: "wrap" }}>
                  <button style={{
                    padding: "13px 28px", background: BRAND.orange, color: BRAND.white,
                    border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700,
                    cursor: "pointer", fontFamily: "inherit",
                  }}>
                    Book a Free AI Strategy Call 📞
                  </button>
                  <button style={{
                    padding: "13px 28px", background: BRAND.navy, color: BRAND.white,
                    border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700,
                    cursor: "pointer", fontFamily: "inherit",
                  }}>
                    Share Score on LinkedIn 📤
                  </button>
                  <button onClick={() => { setPhase("landing"); setUrl(""); setScores(null); setEmail(""); }}
                    style={{
                      padding: "13px 28px", background: BRAND.lightGray, color: BRAND.navy,
                      border: `1px solid ${BRAND.midGray}`, borderRadius: 10, fontSize: 14, fontWeight: 700,
                      cursor: "pointer", fontFamily: "inherit",
                    }}>
                    Score a Competitor 🔍
                  </button>
                </div>
              </div>
            )}

            {/* Footer */}
            <div style={{ textAlign: "center", marginTop: 48, padding: "24px 0", borderTop: `1px solid ${BRAND.midGray}` }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 6 }}>
                <div style={{
                  width: 22, height: 22, borderRadius: 6, background: BRAND.orange,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 11, fontWeight: 900, color: BRAND.white,
                }}>B</div>
                <span style={{ fontSize: 13, fontWeight: 700, color: BRAND.navy }}>BusinessGrader</span>
                <span style={{ fontSize: 10, color: BRAND.darkGray }}>by AgenticScale.ai</span>
              </div>
              <p style={{ fontSize: 11, color: BRAND.darkGray }}>
                Powered by Clawbot AI Agents • Built on Azure + Anthropic Claude • © 2026 AgenticScale
              </p>
            </div>
          </div>
        </div>
      )}

      <style>{`
        @keyframes fadeDown {
          from { opacity: 0; transform: translateY(-20px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
          from { opacity: 0; transform: translateY(24px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
          0%, 100% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.06); opacity: 0.85; }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::placeholder { color: #9CA3AF; }
        input:focus { outline: 2px solid #FF5A0040; }
        @media (max-width: 700px) {
          div[style*="gridTemplateColumns: 1fr 1fr"] {
            grid-template-columns: 1fr !important;
          }
        }
      `}</style>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<BusinessGrader />);
  </script>
</body>
</html>
